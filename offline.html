<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线提示</title>
  <style>
    :root {
      --bg-color: #fcf4f5;
      --text-main: #6b6364;
      --text-sub: #a19899;
      --pink-light: #f4d9dd;
      --gray-light: #e3ddde;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #ffffff 0%, var(--bg-color) 55%, #f2eaeb 100%);
      color: var(--text-main);
      padding: 20px;
    }

    .card {
      width: min(420px, 100%);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--gray-light);
      box-shadow: 0 10px 30px rgba(107, 99, 100, 0.12);
      padding: 28px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: var(--pink-light);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      color: var(--text-sub);
      line-height: 1.6;
      margin-bottom: 18px;
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      background: var(--pink-light);
      color: var(--text-main);
      font-weight: 700;
      font-size: 14px;
      padding: 10px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">离线模式</div>
    <h1>网络已断开</h1>
    <p>当前无法连接网络，已进入离线页面。<br>请检查网络后点击按钮重试。</p>
    <button type="button" onclick="location.reload()">重新加载</button>
  </main>
</body>
</html>
